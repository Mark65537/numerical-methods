<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Численные методы — WebAssembly</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #0c0c0c;
      color: #cccccc;
      font-family: Consolas, "Lucida Console", monospace;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      margin: 0 10px;
    }

    .window {
      background-color: #0c0c0c;
      border: 1px solid #3f3f3f;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    .title-bar {
      background: linear-gradient(to bottom, #2d2d2d, #1a1a1a);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #3f3f3f;
    }

    .title-buttons {
      display: flex;
      gap: 6px;
    }

    .title-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.3);
    }

    .title-btn.close { background-color: #f44747; }
    .title-btn.minimize { background-color: #ffb900; }
    .title-btn.maximize { background-color: #69c746; }

    .title-text {
      color: #cccccc;
      font-size: 12px;
      flex: 1;
      text-align: center;
      margin-right: 50px;
    }

    .menu-bar span {
      margin-right: 15px;
      color: #888;
    }

    .menu-bar span:first-letter {
      text-decoration: underline;
    }

    .content {
      padding: 20px;
    }

    h1 {
      color: #569cd6;
      font-size: 18px;
      margin: 0 0 10px 0;
      font-weight: normal;
      border-bottom: 1px solid #3f3f3f;
      padding-bottom: 10px;
    }

    p {
      color: #888;
      margin: 0 0 20px 0;
      line-height: 1.6;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    li:last-child {
      border-bottom: none;
    }

    a {
      color: #569cd6;
      text-decoration: none;
      display: block;
    }

    a:hover {
      color: #9cdcfe;
      text-decoration: underline;
    }

    a::before {
      content: "▸ ";
      color: #6a9955;
    }

    .description {
      color: #6a9955;
      font-size: 12px;
      margin-top: 4px;
    }

    .badge {
      display: inline-block;
      background-color: #264f78;
      color: #9cdcfe;
      padding: 2px 6px;
      font-size: 11px;
      margin-left: 10px;
      border-radius: 2px;
    }

    .project-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .project-link {
      flex: 1;
    }

    .info-btn {
      background-color: #264f78;
      color: #9cdcfe;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .info-btn:hover {
      background-color: #3a6ea5;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #0c0c0c;
      border: 1px solid #3f3f3f;
      border-radius: 8px;
      max-width: 600px;
      max-height: 80vh;
      width: 90%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    .modal-header {
      background: linear-gradient(to bottom, #2d2d2d, #1a1a1a);
      padding: 12px 16px;
      border-bottom: 1px solid #3f3f3f;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px 8px 0 0;
    }

    .modal-title {
      color: #569cd6;
      font-size: 14px;
      margin: 0;
    }

    .modal-close {
      background: none;
      border: none;
      color: #888;
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover {
      color: #f44747;
    }

    .modal-content {
      padding: 16px;
      overflow-y: auto;
      color: #888;
      font-size: 13px;
      line-height: 1.6;
    }

    .modal-content pre {
      background: #1a1a1a;
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .modal-content code {
      color: #ce9178;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 16px;
    }
    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    ::-webkit-scrollbar-thumb {
      background: #3f3f3f;
      border: 3px solid #1a1a1a;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="window">
      <div class="title-bar">
        <div class="title-buttons">
          <div class="title-btn close"></div>
          <div class="title-btn minimize"></div>
          <div class="title-btn maximize"></div>
        </div>
        <span class="title-text">Численные методы — WebAssembly</span>
      </div>
      <div class="content">
        <h1>Численные методы (WASM)</h1>
        <p>Сборки Emscripten для запуска в браузере. Для ввода с клавиатуры используйте поля ввода в странице (stdin).</p>
        <ul>
          {{PROJECTS}}
        </ul>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Описание проекта</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <script>
    function showDescription(btn) {
      var description = btn.getAttribute('data-description');
      description = description.replace(/\\n/g, '\n');
      document.getElementById('modal-content').innerHTML = '<pre>' + escapeHtml(description) + '</pre>';
      document.getElementById('modal').classList.add('open');
    }

    function closeModal(event) {
      if (!event || event.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.remove('open');
      }
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
